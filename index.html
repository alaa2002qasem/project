<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link rel="stylesheet" href="./assets/output.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!-- Font Awesome for icons -->

</head>
<body class="bg-background font-jost ">


               <!------- NAVBAR---------->
<div class="navbar bg-white shadow-sm px-6 sm:px-6 md:px-12 flex justify-between items-center">

  <!-- LEFT (hamburger + logo) -->
  <div class="flex items-center gap-4">
    <!-- Hamburger -->
    <button class="btn btn-square btn-ghost lg:hidden w-7 h-7 sm:w-8 sm:h-8 md:w-9 md:h-9">
      <svg xmlns="http://www.w3.org/2000/svg"
           fill="none" viewBox="0 0 24 24"
           class="inline-block h-5 w-5 sm:h-6 sm:w-6 md:h-7 md:w-7 stroke-current">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- Logo -->
    <img src="logo.png" alt="my.decor" class="w-7 h-auto sm:w-8 md:w-10 object-contain">
  </div>

  <!-- CENTER MENU -->
  <div class="hidden lg:flex">
    <ul class="flex gap-4 md:gap-6 font-medium text-[13px] sm:text-[14px] md:text-[15px]">
      <li><a class="text-black hover:text-red-500 flex items-center gap-1 transition-colors duration-200">Homepages <i class="fa-solid fa-angle-down text-[10px] ml-1"></i></a></li>
      <li><a class="text-black hover:text-red-500 flex items-center gap-1 transition-colors duration-200">Shop <i class="fa-solid fa-angle-down text-[10px] ml-1"></i></a></li>
      <li><a class="text-black hover:text-red-500 flex items-center gap-1 transition-colors duration-200">Product <i class="fa-solid fa-angle-down text-[10px] ml-1"></i></a></li>
      <li><a class="text-black hover:text-red-500 flex items-center gap-1 transition-colors duration-200">Blog <i class="fa-solid fa-angle-down text-[10px] ml-1"></i></a></li>
      <li><a class="text-black hover:text-red-500 flex items-center gap-1 transition-colors duration-200">Pages <i class="fa-solid fa-angle-down text-[10px] ml-1"></i></a></li>
    </ul>
  </div>

  <!-- RIGHT ICONS -->
  <div class="flex items-center gap-6 sm:gap-3 md:gap-4 ">
    <!-- Search -->
    <button class="btn btn-circle bg-gray-200 hover:bg-gray-300 flex items-center justify-center
                   w-7 h-7 sm:w-6 sm:h-6 md:w-9 md:h-9 text-xs sm:text-sm md:text-lg">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <!-- User -->
    <button class="btn btn-circle bg-gray-200 hover:bg-gray-300 flex items-center justify-center
                   w-7 h-7 sm:w-7 sm:h-7 md:w-9 md:h-9 text-xs sm:text-sm md:text-lg">
      <i class="fa-regular fa-user"></i>
    </button>

    <!-- Wishlist -->
    <div class="indicator">
      <span class="indicator-item badge badge-error badge-[8px] sm:badge-xs md:badge-sm">0</span>
      <button class="btn btn-circle bg-gray-200 hover:bg-gray-300 flex items-center justify-center
                     w-7 h-7 sm:w-7 sm:h-7 md:w-9 md:h-9 text-xs sm:text-sm md:text-lg">
        <i class="fa-regular fa-heart"></i>
      </button>
    </div>

    <!-- Cart -->
    <div class="indicator">
      <span class="indicator-item badge badge-error badge-[8px] sm:badge-xs md:badge-sm">0</span>
      <button class="btn btn-circle bg-gray-200 hover:bg-gray-300 flex items-center justify-center
                     w-7 h-7 sm:w-7 sm:h-7 md:w-9 md:h-9 text-xs sm:text-sm md:text-lg">
        <i class="fa-solid fa-cart-shopping"></i>
      </button>
    </div>
  </div>

</div>
<!--end of NAVBAR -->



<!-- HERO SECTION -->

 


</body>
</html>
